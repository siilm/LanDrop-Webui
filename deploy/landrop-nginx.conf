# =============================================================================
# LanDrop-WebUI — Nginx 静态托管配置
# =============================================================================
# 说明：
#   这是一个纯静态文件托管配置。后端地址由用户在登录页的
#   「服务器配置」中自行填写，无需在 nginx 中配置反向代理。
#
# 用法：
#   sudo cp deploy/landrop-nginx.conf /etc/nginx/sites-available/landrop
#   sudo ln -sf /etc/nginx/sites-available/landrop /etc/nginx/sites-enabled/
#
#   或者使用部署脚本：
#   sudo bash deploy/deploy.sh --install
# =============================================================================

server {
    listen 80;
    server_name _;  # 替换为你的域名或 IP

    # ── 静态文件 ──────────────────────────────────────────────────────
    root /var/www/landrop;
    index index.html;

    # SPA 路由：所有非文件请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 缓存策略 ──────────────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── 安全头 ────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Gzip 压缩 ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1024;
}
